baseURL = 'https://dav84.us/'
locale = 'en-us'
title = 'DAV 84'
theme = 'beautifulhugo'

# hugo.toml


[pagination]
  pagerSize = 5

[Services]
  [Services.googleAnalytics]
    # id = "XXX"

[Params]
  subtitle = "Keeping Our Promise To America's Veterans"
  mainSections = ["post","posts"]
  logo = "/img/dav-seal.png"
  favicon = "/img/dav-seal.png"
  dateFormat = ":date_long"
  commit = false
  rss = false
  readingTime = false
  wordCount = false
  colorScheme = "light"
  socialShare = false
  showRelatedPosts = false
  hideAuthor = true
  disableFigureOverride = true
  headerImgStyle = "narrow"
  delayDisqus = true
  custom_css = "css/dav-custom.css"

[markup.goldmark.renderer] 
    unsafe = true

[[Params.bigimg]]
  src = "/img/dav84-banner-01.png"
  desc = ""
  position = "center center"
[[Params.bigimg]]
  src = "/img/dav84-banner-02.png"
  desc = ""
[[Params.bigimg]]
  src = "/img/dav84-banner-03.png"
  desc = ""

[Params.author]
  email = "contact@dav84.us"
  facebook = "DAV84IL"
  instagram = "DAV84IL"


