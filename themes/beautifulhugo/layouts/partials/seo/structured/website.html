{{- $schema := dict
  "@context" "https://schema.org"
  "@type" "WebSite"
  "name" .Site.Title
  "url" .Site.BaseURL
  "@id" (printf "%s#website" .Site.BaseURL)
-}}
{{- with .Site.Params.alternatePageName -}}
  {{- $schema = merge $schema (dict "alternateName" .) -}}
{{- end -}}
<script type="application/ld+json">
{{ $schema | jsonify (dict "indent" "  ") | safeJS }}
</script>
